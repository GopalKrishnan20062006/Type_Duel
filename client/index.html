<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Typing Race</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Typing Race</h1>

<button id="connectButton">
    Connect
</button>

<div id="game">

    <h2 id="status">Not Connected</h2>

    <div id="text"></div>

<div id="stats">
    <span id="wpm">WPM: 0</span>
    <span id="accuracy">Accuracy: 100%</span>
</div>

    <input
        id="typingInput"
        type="text"
        autocomplete="off"
        spellcheck="false"
    >

</div>

<script src="script.js"></script>

</body>
</html>
